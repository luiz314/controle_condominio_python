
<!DOCTYPE html>
<html>
<head>
<title>Controle de Acesso</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {overflow-x:hidden;}
.sidebar {height:100vh;background:#1f2937;color:white;position:fixed;width:220px;}
.sidebar a {color:white;display:block;padding:10px;text-decoration:none;}
.sidebar a:hover {background:#374151;}
.content {margin-left:220px;padding:20px;}
.status-on {color:green;font-weight:bold;}
.status-off {color:red;font-weight:bold;}
</style>

</head>

<body>

<div class="sidebar">
<h4 class="text-center mt-3">🏢 Condomínio</h4>
<a href="/dashboard">🏠 Dashboard</a>
<a href="/cadastrar">➕ Cadastrar</a>
<a href="/listar">👥 Pessoas</a>
<a href="/backup">💾 Backup</a>
</div>

<div class="content">

<div class="d-flex justify-content-between mb-4">
<h3>Sistema</h3>
<div>👤 {{ session['user'] }}</div>
</div>

{% block content %}{% endblock %}

</div>

</body>
</html>
